<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp QR Code - HC Pneus</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            text-align: center;
            max-width: 400px;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
        .qr-code {
            background: white;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .qr-code img { max-width: 100%; height: auto; }
        p { color: #94a3b8; font-size: 0.875rem; line-height: 1.5; }
        .status { margin-top: 1rem; font-weight: 500; color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Conectar WhatsApp</h1>
        <div class="qr-code">
            {% if qr_data.base64 %}
                <img src="{{ qr_data.base64 }}" alt="QR Code WhatsApp">
            {% else %}
                <p>QR Code não disponível. Tente atualizar a página.</p>
            {% endif %}
        </div>
        <p>Acesse o WhatsApp no seu celular > Configurações > Dispositivos Conectados > Conectar um dispositivo.</p>
        <div class="status">Instância: {{ qr_data.instanceName }}</div>
    </div>
</body>
</html>
