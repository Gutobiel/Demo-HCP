<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento Auto HC Pneus</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #121212;
            --chat-bg: #1e1e1e;
            --user-msg: rgba(0, 132, 255, 0.9);
            --agent-msg: #2d2d2d;
            --text-color: #f1f1f1;
            --text-muted: #aaaaaa;
            --accent: #25D366; /* WhatsApp ish green for action */
            --input-bg: #333333;
            --border-radius: 18px;
            --glass-bg: rgba(30, 30, 30, 0.85);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            backdrop-filter: blur(10px);
        }

        .chat-container {
            width: 100%;
            max-width: 480px;
            height: 85vh;
            background: var(--glass-bg);
            border-radius: 20px;
            box-shadow: 0 16px 32px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .chat-header {
            background: rgba(0, 0, 0, 0.4);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .chat-header h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .chat-header p {
            margin: 5px 0 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .chat-messages {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: rgba(255,255,255,0.2);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-out;
            word-wrap: break-word;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.agent {
            background: var(--agent-msg);
            color: var(--text-color);
            align-self: flex-start;
            border-radius: var(--border-radius) var(--border-radius) var(--border-radius) 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .message.user {
            background: var(--user-msg);
            color: #ffffff;
            align-self: flex-end;
            border-radius: var(--border-radius) var(--border-radius) 4px var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,132,255,0.3);
        }

        .catalog-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px;
            margin-top: 10px;
        }
        .catalog-item h4 {
            margin: 0 0 5px 0;
            font-size: 0.9rem;
            color: #fff;
        }
        .catalog-item p {
            margin: 0;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .chat-input {
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            display: flex;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
        }

        .chat-input input {
            flex-grow: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 30px;
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 0.95rem;
            outline: none;
            transition: background 0.3s;
        }

        .chat-input input:focus {
            background: #404040;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.1);
        }

        .chat-input button {
            background: var(--accent);
            color: #000;
            border: none;
            padding: 0 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            transition: transform 0.2s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .chat-input button:hover {
            transform: scale(1.05);
            background: #20b857;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: var(--agent-msg);
            border-radius: var(--border-radius) var(--border-radius) var(--border-radius) 4px;
            align-self: flex-start;
            margin-bottom: 10px;
        }

        .typing-indicator span {
            height: 6px;
            width: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <h1>Vendedor HC Pneus</h1>
        <p>Agent Online</p>
    </div>
    
    <div class="chat-messages" id="chat-messages">
        <div class="message agent">
            Olá! Sou o assistente virtual da HC Pneus. Como posso ajudar hoje?
        </div>
        <!-- Messages will appear here -->
    </div>

    <div class="typing-indicator" id="typing-indicator">
        <span></span><span></span><span></span>
    </div>

    <form class="chat-input" id="chat-form">
        <input type="hidden" name="csrfmiddlewaretoken" value="{{ csrf_token }}">
        <input type="text" id="user-input" placeholder="Digite sua mensagem..." autocomplete="off" required>
        <button type="submit">Enviar</button>
    </form>
</div>

<script>
    const form = document.getElementById('chat-form');
    const input = document.getElementById('user-input');
    const messagesContainer = document.getElementById('chat-messages');
    const typingIndicator = document.getElementById('typing-indicator');

    function appendMessage(text, sender, isHTML=false) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        
        if (isHTML) {
            msgDiv.innerHTML = text; // Permite formatação de catálogo
        } else {
            // Formatar quebras de linha
            const formattedText = text.replace(/\n/g, '<br>');
            msgDiv.innerHTML = formattedText;
        }

        messagesContainer.appendChild(msgDiv);
        scrollToBottom();
    }

    function scrollToBottom() {
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        appendMessage(text, 'user');
        input.value = '';
        
        // Show typing indicator
        typingIndicator.style.display = 'block';
        messagesContainer.appendChild(typingIndicator);
        scrollToBottom();

        try {
            // Simulate session ID or let Django handle it via cookies
            const response = await fetch('/api/chat/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': document.querySelector('[name=csrfmiddlewaretoken]').value
                },
                body: JSON.stringify({ message: text })
            });

            const data = await response.json();
            
            // Hide typing indicator
            typingIndicator.style.display = 'none';
            messagesContainer.appendChild(typingIndicator); // remove from normal flow or keep hidden

            if (data.response) {
                appendMessage(data.response, 'agent', true);
            } else if (data.error) {
                appendMessage("Desculpe, ocorreu um erro: " + data.error, 'agent');
            }

        } catch (err) {
            typingIndicator.style.display = 'none';
            appendMessage("Erro na conexão com o servidor.", 'agent');
            console.error(err);
        }
    });
</script>

</body>
</html>
